name: Atualizar Tarifas ANEEL

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  extrair:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Testa acesso ao portal
        run: |
          echo "=== Teste de conectividade ==="
          curl -I --max-time 15 https://portalrelatorios.aneel.gov.br/luznatarifa/basestarifas || true
          echo "=== Resultado ==="

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências
        run: pip install playwright pandas openpyxl && playwright install chromium --with-deps

      - name: Extrair tarifas via Playwright
        run: python scripts/extrator_playwright.py --output data/tarifas_aneel.json --headless
        timeout-minutes: 8

      - name: Verificar resultado
        run: |
          python3 -c "
          import json; from pathlib import Path
          d = json.loads(Path('data/tarifas_aneel.json').read_text())
          t = len(d.get('distribuidoras', {}))
          print(f'✅ {t} distribuidoras' if t > 0 else '❌ vazio')
          __import__('sys').exit(0 if t > 0 else 1)
          "

      - name: Commitar se houve mudança
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tarifas_aneel.json
          git diff --staged --quiet && echo "Sem mudanças." || (
            git commit -m "chore: atualiza tarifas ANEEL $(date -u +%Y-%m-%d)"
            git push
          )
